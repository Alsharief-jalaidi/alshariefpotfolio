<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portfolio – Alsharief C. Jalaidi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --beige-deep:   #c8b89a;
      --beige-mid:    #e0d0b8;
      --beige-light:  #f5efe4;
      --beige-pale:   #faf7f2;
      --white:        #ffffff;
      --brown-ink:    #5a4633;
      --brown-soft:   #8b6f52;
      --accent:       #b08d6a;
      --shadow:       rgba(90, 70, 51, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--beige-pale);
      color: var(--brown-ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%,  rgba(200,184,154,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%,  rgba(176,141,106,.14) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(255,255,255,.5)  0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px 40px;
      animation: fadeDown .9s ease both;
    }

    .header-line {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--beige-deep), transparent);
      margin-bottom: 32px;
    }

    .profile-wrap {
      position: relative;
      margin-bottom: 28px;
      animation: popIn .8s cubic-bezier(.34,1.56,.64,1) .2s both;
    }

    .profile-ring {
      width: 148px; height: 148px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--beige-deep), var(--white), var(--accent));
      box-shadow: 0 8px 32px var(--shadow), 0 2px 8px rgba(176,141,106,.25);
    }

    .profile-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--beige-light);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .3s ease;
    }
    .profile-inner:hover { transform: scale(1.04); }

    .profile-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .profile-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      color: var(--brown-soft);
      transition: opacity .3s;
    }
    .profile-placeholder svg { opacity: .6; }
    .profile-placeholder span {
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .7;
    }

    .profile-badge {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
      transition: transform .25s ease, background .25s;
    }
    .profile-badge:hover { transform: scale(1.15); background: var(--brown-ink); }
    .profile-badge svg { fill: white; }

    #profileInput { display: none; }

    .student-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: .04em;
      text-align: center;
      color: var(--brown-ink);
      line-height: 1.15;
    }

    .student-number {
      margin-top: 8px;
      font-size: .8rem;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown-soft);
    }

    .divider {
      margin-top: 28px;
      width: 240px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--beige-deep), transparent);
    }

    .section-label {
      position: relative; z-index: 1;
      text-align: center;
      margin: 48px 0 32px;
      animation: fadeUp .7s ease .5s both;
    }
    .section-label h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--brown-soft);
    }

    .grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .card {
      background: var(--white);
      border-radius: 18px;
      border: 1px solid rgba(200,184,154,.35);
      box-shadow: 0 4px 18px var(--shadow);
      overflow: hidden;
      transition: transform .35s cubic-bezier(.34,1.2,.64,1), box-shadow .35s ease;
      animation: fadeUp .6s ease both;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.015);
      box-shadow: 0 14px 36px rgba(90,70,51,.16);
    }

    .card:nth-child(1) { animation-delay: .1s; }
    .card:nth-child(2) { animation-delay: .2s; }
    .card:nth-child(3) { animation-delay: .3s; }
    .card:nth-child(4) { animation-delay: .4s; }
    .card:nth-child(5) { animation-delay: .5s; }

    .card-header {
      padding: 16px 20px 14px;
      background: linear-gradient(135deg, var(--beige-pale), var(--beige-light));
      border-bottom: 1px solid rgba(200,184,154,.3);
      display: flex; align-items: center; gap: 10px;
    }

    .card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--beige-mid), var(--beige-deep));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { fill: var(--brown-ink); }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--brown-ink);
    }

    .card-subtitle {
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brown-soft);
      margin-top: 1px;
    }

    .upload-zone {
      padding: 22px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .upload-slot {
      position: relative;
      width: 100%; aspect-ratio: 4/3;
      border-radius: 12px;
      border: 1.5px dashed var(--beige-deep);
      background: var(--beige-pale);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: border-color .25s, background .25s;
    }
    .upload-slot:hover {
      border-color: var(--accent);
      background: rgba(224,208,184,.25);
    }
    .upload-slot.has-image { border-style: solid; border-color: var(--beige-mid); }

    .slot-hint {
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--brown-soft);
      opacity: .75;
      pointer-events: none;
    }
    .slot-icon { opacity: .5; pointer-events: none; }

    .slot-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 11px;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .slot-img.visible { opacity: 1; }

    /* ── SLOT OVERLAY: two action buttons ── */
    .slot-overlay { display: none; }
    .upload-slot.has-image .slot-overlay {
      position: absolute; inset: 0;
      background: rgba(90,70,51,.52);
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      opacity: 0;
      border-radius: 11px;
      transition: opacity .25s;
    }
    .upload-slot.has-image:hover .slot-overlay { opacity: 1; }
    .upload-slot.has-image .slot-overlay { display: flex; }

    .overlay-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: white;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 500;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background .2s;
    }
    .overlay-btn:hover { background: rgba(255,255,255,.28); }
    .overlay-btn svg { fill: white; }

    .add-slot-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px dashed rgba(200,184,154,.6);
      background: transparent;
      color: var(--brown-soft);
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s;
    }
    .add-slot-btn:hover {
      background: var(--beige-light);
      border-color: var(--accent);
      color: var(--brown-ink);
    }

    input[type="file"].hidden { display: none; }

    /* ══════════════════════════════════════
       LIGHTBOX
    ══════════════════════════════════════ */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(40, 28, 18, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, background .3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
      background: rgba(40, 28, 18, .88);
    }

    .lightbox-backdrop {
      position: absolute; inset: 0;
      cursor: zoom-out;
    }

    .lightbox-content {
      position: relative;
      z-index: 1;
      max-width: min(90vw, 860px);
      max-height: 90vh;
      transform: scale(.88);
      transition: transform .35s cubic-bezier(.34,1.3,.64,1);
    }
    .lightbox.open .lightbox-content {
      transform: scale(1);
    }

    .lightbox-img {
      display: block;
      max-width: 100%;
      max-height: 86vh;
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: -14px; right: -14px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--brown-ink);
      border: 2px solid rgba(255,255,255,.35);
      color: white;
      font-size: 1.1rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .2s;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
    }
    .lightbox-close:hover {
      background: var(--accent);
      transform: scale(1.1) rotate(90deg);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: white;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .2s;
      z-index: 2;
      user-select: none;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,.3); transform: translateY(-50%) scale(1.1); }
    .lightbox-prev { left: -56px; }
    .lightbox-next { right: -56px; }
    .lightbox-nav.hidden { opacity: 0; pointer-events: none; }

    .lightbox-counter {
      position: absolute;
      bottom: -34px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.55);
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── SAVE TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--brown-ink);
      color: var(--beige-pale);
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 99px;
      box-shadow: 0 4px 20px rgba(90,70,51,.25);
      opacity: 0;
      transition: opacity .3s ease, transform .3s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding-bottom: 40px;
      color: var(--brown-soft);
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .6;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .lightbox-prev { left: -44px; }
      .lightbox-next { right: -44px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-line"></div>
  <div class="profile-wrap">
    <div class="profile-ring">
      <div class="profile-inner" id="profileFrame" onclick="document.getElementById('profileInput').click()">
        <div class="profile-placeholder" id="profilePlaceholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="var(--brown-soft)"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          <span>Add Photo</span>
        </div>
        <img id="profileImg" src="" alt="Profile" style="display:none"/>
      </div>
    </div>
    <div class="profile-badge" onclick="document.getElementById('profileInput').click()" title="Change photo">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>
    <input type="file" id="profileInput" accept="image/*"/>
  </div>
  <h1 class="student-name">Alsharief C. Jalaidi</h1>
  <p class="student-number">Student No. 251100657</p>
  <div class="divider"></div>
</header>

<div class="section-label">
  <h2>Academic Portfolio</h2>
</div>

<div class="grid" id="cardGrid"></div>

<footer>
  <p>© 2025 Alsharief C. Jalaidi &nbsp;·&nbsp; Student Portfolio</p>
</footer>

<div class="toast" id="toast">✓ &nbsp;Saved to browser</div>

<!-- ══════════ LIGHTBOX ══════════ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <div class="lightbox-backdrop" id="lbBackdrop"></div>
  <div class="lightbox-content">
    <button class="lightbox-close" id="lbClose" title="Close (Esc)">✕</button>
    <button class="lightbox-nav lightbox-prev hidden" id="lbPrev" title="Previous">&#8592;</button>
    <button class="lightbox-nav lightbox-next hidden" id="lbNext" title="Next">&#8594;</button>
    <img class="lightbox-img" id="lbImg" src="" alt="Full size photo"/>
    <div class="lightbox-counter" id="lbCounter"></div>
  </div>
</div>

<script>
  /* ══════════════════════════════════════
     STORAGE HELPERS
  ══════════════════════════════════════ */
  const STORAGE_KEY = 'portfolio_alsharief';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); showToast(); }
    catch { alert('Storage full! Try removing some photos.'); }
  }

  let db = loadData();

  /* ══════════════════════════════════════
     TOAST
  ══════════════════════════════════════ */
  let toastTimer;
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ══════════════════════════════════════
     LIGHTBOX
  ══════════════════════════════════════ */
  // allImages is rebuilt every time a slot is created/updated
  // Each entry: { src, label }
  let lbImages   = [];   // current gallery images (same category)
  let lbIndex    = 0;

  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lbImg');
  const lbClose  = document.getElementById('lbClose');
  const lbPrev   = document.getElementById('lbPrev');
  const lbNext   = document.getElementById('lbNext');
  const lbCounter= document.getElementById('lbCounter');
  const lbBackdrop = document.getElementById('lbBackdrop');

  function openLightbox(images, startIndex) {
    lbImages = images;
    lbIndex  = startIndex;
    renderLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function renderLightbox() {
    lbImg.src = lbImages[lbIndex].src;
    const total = lbImages.length;
    lbCounter.textContent = total > 1 ? `${lbIndex + 1} / ${total}` : '';
    lbPrev.classList.toggle('hidden', lbIndex === 0 || total === 1);
    lbNext.classList.toggle('hidden', lbIndex === total - 1 || total === 1);
  }

  lbClose.addEventListener('click', closeLightbox);
  lbBackdrop.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; renderLightbox(); } });
  lbNext.addEventListener('click', () => { if (lbIndex < lbImages.length - 1) { lbIndex++; renderLightbox(); } });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')       closeLightbox();
    if (e.key === 'ArrowLeft'  && lbIndex > 0)                      { lbIndex--; renderLightbox(); }
    if (e.key === 'ArrowRight' && lbIndex < lbImages.length - 1)    { lbIndex++; renderLightbox(); }
  });

  /* ══════════════════════════════════════
     CATEGORIES
  ══════════════════════════════════════ */
  const categories = [
    { id: 'quiz',      title: 'Quiz',         subtitle: 'Short Assessments',
      icon: `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>` },
    { id: 'long-quiz', title: 'Long Quiz',     subtitle: 'Major Assessments',
      icon: `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>` },
    { id: 'labworks',  title: 'Lab Works',     subtitle: 'Laboratory Activities',
      icon: `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M19.8 18.4L14 10.67V6h1a1 1 0 000-2H9a1 1 0 000 2h1v4.67L4.2 18.4A1 1 0 005 20h14a1 1 0 00.8-1.6z"/></svg>` },
    { id: 'midterm',   title: 'Midterm Exam',  subtitle: 'Mid-Semester Evaluation',
      icon: `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>` },
    { id: 'final',     title: 'Final Exam',    subtitle: 'End-of-Term Evaluation',
      icon: `<svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>` },
  ];

  const grid = document.getElementById('cardGrid');

  categories.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${cat.icon}</div>
        <div>
          <div class="card-title">${cat.title}</div>
          <div class="card-subtitle">${cat.subtitle}</div>
        </div>
      </div>
      <div class="upload-zone" id="zone-${cat.id}"></div>
    `;
    grid.appendChild(card);

    const zone = card.querySelector(`#zone-${cat.id}`);
    const defaultSlots = { 'quiz': 3, 'long-quiz': 2, 'labworks': 3, 'midterm': 1, 'final': 1 };
    const slotCount = defaultSlots[cat.id] || 1;
    const savedImages = db[cat.id] || Array(slotCount).fill(null);

    savedImages.forEach((imgData, idx) => {
      const slot = createSlot(cat.id, idx, imgData, zone);
      zone.appendChild(slot);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-slot-btn';
    addBtn.textContent = '+ Add Photo';
    addBtn.onclick = () => {
      const idx = zone.querySelectorAll('.upload-slot').length;
      const slot = createSlot(cat.id, idx, null, zone);
      zone.insertBefore(slot, addBtn);
      if (!db[cat.id]) db[cat.id] = [];
      db[cat.id].push(null);
      saveData(db);
    };
    zone.appendChild(addBtn);
  });

  /* ══════════════════════════════════════
     SLOT CREATION
  ══════════════════════════════════════ */
  function createSlot(catId, idx, savedSrc, zone) {
    const slot = document.createElement('div');
    slot.className = 'upload-slot';
    slot.innerHTML = `
      <svg class="slot-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8b6f52" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span class="slot-hint">Upload Image</span>
      <img class="slot-img" src="" alt=""/>
      <div class="slot-overlay">
        <button class="overlay-btn" data-action="view">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          View
        </button>
        <button class="overlay-btn" data-action="change">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Change
        </button>
      </div>
      <input type="file" class="hidden" accept="image/*"/>
    `;

    const input   = slot.querySelector('input[type="file"]');
    const imgEl   = slot.querySelector('.slot-img');
    const hint    = slot.querySelector('.slot-hint');
    const icon    = slot.querySelector('.slot-icon');
    const btnView   = slot.querySelector('[data-action="view"]');
    const btnChange = slot.querySelector('[data-action="change"]');

    // Restore saved image
    if (savedSrc) {
      imgEl.src = savedSrc;
      imgEl.classList.add('visible');
      hint.style.display = 'none';
      icon.style.display = 'none';
      slot.classList.add('has-image');
    }

    // Click on empty slot → open file picker
    slot.addEventListener('click', (e) => {
      if (slot.classList.contains('has-image')) return; // handled by overlay buttons
      input.click();
    });

    // View button → open lightbox
    btnView.addEventListener('click', (e) => {
      e.stopPropagation();
      // Gather all filled slots in this category's zone
      const allSlots = zone.querySelectorAll('.upload-slot.has-image');
      const imgs = Array.from(allSlots).map(s => ({ src: s.querySelector('.slot-img').src }));
      const thisIdx = Array.from(allSlots).indexOf(slot);
      openLightbox(imgs, thisIdx >= 0 ? thisIdx : 0);
    });

    // Change button → open file picker
    btnChange.addEventListener('click', (e) => {
      e.stopPropagation();
      input.click();
    });

    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        imgEl.src = dataUrl;
        imgEl.classList.add('visible');
        hint.style.display = 'none';
        icon.style.display = 'none';
        slot.classList.add('has-image');
        if (!db[catId]) db[catId] = [];
        db[catId][idx] = dataUrl;
        saveData(db);
      };
      reader.readAsDataURL(file);
    });

    return slot;
  }

  /* ══════════════════════════════════════
     PROFILE PHOTO
  ══════════════════════════════════════ */
  if (db.profile) {
    const img = document.getElementById('profileImg');
    const placeholder = document.getElementById('profilePlaceholder');
    img.src = db.profile;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  }

  document.getElementById('profileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      const img = document.getElementById('profileImg');
      const placeholder = document.getElementById('profilePlaceholder');
      img.src = dataUrl;
      img.style.display = 'block';
      placeholder.style.display = 'none';
      db.profile = dataUrl;
      saveData(db);
    };
    reader.readAsDataURL(file);
  });
</script>
</body>
</html>
